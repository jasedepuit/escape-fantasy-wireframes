<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 310" width="750" height="310">
  <defs>

    <!-- Background: near-black to Spanish red, with a warm orange edge -->
    <linearGradient id="vuelta-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0E0000"/>
      <stop offset="28%"  stop-color="#3C0004"/>
      <stop offset="62%"  stop-color="#8C000C"/>
      <stop offset="88%"  stop-color="#D40010"/>
      <stop offset="100%" stop-color="#E52010"/>
    </linearGradient>

    <!-- Bottom overlay -->
    <linearGradient id="vuelta-ovr-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="46%"  stop-color="#000000" stop-opacity="0.54"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </linearGradient>

    <!-- Top vignette -->
    <linearGradient id="vuelta-ovr-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.44"/>
      <stop offset="38%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Left vignette -->
    <linearGradient id="vuelta-ovr-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.60"/>
      <stop offset="44%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- ① Base background -->
  <rect width="750" height="310" fill="url(#vuelta-bg)"/>

  <!-- ② Spanish sun glow — warm red-orange, upper right -->
  <ellipse cx="510" cy="62" rx="290" ry="135" fill="#E30613" fill-opacity="0.20"/>
  <ellipse cx="510" cy="62" rx="165" ry="78"  fill="#FF5722" fill-opacity="0.15"/>
  <ellipse cx="510" cy="62" rx="75"  ry="38"  fill="#FF8C00" fill-opacity="0.12"/>

  <!-- ③ Far mountain range — more mesa-like, Iberian landscape -->
  <path d="M 0,242 L 65,218 L 125,200 L 188,215 L 248,180 L 308,196 L 362,158 L 418,175 L 474,150 L 532,170 L 588,190 L 645,168 L 702,190 L 750,202 L 750,310 L 0,310 Z"
        fill="rgba(120,0,10,0.52)"/>

  <!-- ④ Near mountain range — lower, broader ridges -->
  <path d="M 0,290 L 52,268 L 108,254 L 162,272 L 220,248 L 270,262 L 325,232 L 378,248 L 432,222 L 488,242 L 540,258 L 595,240 L 645,265 L 695,255 L 740,275 L 750,280 L 750,310 L 0,310 Z"
        fill="rgba(46,0,4,0.80)"/>

  <!-- ⑤ Mesa top edge highlights — flat-top plateau texture -->
  <line x1="362" y1="158" x2="418" y2="175" stroke="rgba(255,140,0,0.18)" stroke-width="2"/>
  <line x1="474" y1="150" x2="532" y2="170" stroke="rgba(255,140,0,0.15)" stroke-width="2"/>
  <ellipse cx="474" cy="150" rx="25" ry="11" fill="rgba(255,100,50,0.18)"/>

  <!-- ⑥ Diagonal texture lines -->
  <line x1="520" y1="0"  x2="750" y2="160" stroke="rgba(255,80,20,0.04)"  stroke-width="22"/>
  <line x1="585" y1="0"  x2="750" y2="110" stroke="rgba(255,140,0,0.03)"  stroke-width="13"/>
  <line x1="648" y1="0"  x2="750" y2="62"  stroke="rgba(255,80,20,0.025)" stroke-width="8"/>

  <!-- ⑦ Bottom text overlay -->
  <rect width="750" height="310" fill="url(#vuelta-ovr-b)"/>

  <!-- ⑧ Top vignette -->
  <rect width="750" height="310" fill="url(#vuelta-ovr-t)"/>

  <!-- ⑨ Left vignette -->
  <rect width="750" height="310" fill="url(#vuelta-ovr-l)"/>

  <!-- ⑩ Spanish flag strip (red / gold / red) -->
  <rect x="40" y="220" width="4" height="50" rx="2" fill="#AA151B"/>
  <rect x="45" y="220" width="4" height="50" rx="2" fill="#F1BF00"/>
  <rect x="50" y="220" width="4" height="50" rx="2" fill="#AA151B"/>

  <!-- ⑪ Race name — two lines -->
  <text x="63" y="248"
        font-family="system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="900" fill="#FFFFFF"
        letter-spacing="-0.5">LA VUELTA</text>
  <text x="63" y="267"
        font-family="system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="17" font-weight="800" fill="#FFB6D9"
        letter-spacing="1.5">FEMENINA</text>
  <text x="63" y="283"
        font-family="system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="12" font-weight="600" fill="rgba(255,255,255,0.55)"
        letter-spacing="3.5">2026</text>

  <!-- ⑫ Accent dots — Spanish red-orange -->
  <circle cx="710" cy="252" r="5" fill="#FF5722" fill-opacity="0.80"/>
  <circle cx="724" cy="252" r="3" fill="#E30613" fill-opacity="0.50"/>
  <circle cx="734" cy="252" r="2" fill="#E30613" fill-opacity="0.30"/>

</svg>
