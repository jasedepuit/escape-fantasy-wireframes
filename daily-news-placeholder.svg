<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 220" width="750" height="220">
  <defs>
    <linearGradient id="dn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#161616"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <!-- Subtle left-to-right fade for depth -->
    <linearGradient id="dn-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF6F42" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF6F42" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="750" height="220" fill="url(#dn-bg)"/>
  <rect width="750" height="220" fill="url(#dn-fade)"/>

  <!-- Subtle grid lines (newspaper texture suggestion) -->
  <line x1="0" y1="55"  x2="750" y2="55"  stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="110" x2="750" y2="110" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="165" x2="750" y2="165" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="187" y1="0" x2="187" y2="220" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <line x1="375" y1="0" x2="375" y2="220" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <line x1="563" y1="0" x2="563" y2="220" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- Orange accent bar on the left -->
  <rect x="0" y="0" width="4" height="220" fill="#FF6F42"/>

  <!-- Newspaper icon — centred, works as thumbnail focal point -->
  <!-- Page outline -->
  <rect x="331" y="72" width="88" height="76" rx="4"
        fill="none" stroke="rgba(255,111,66,0.35)" stroke-width="2"/>
  <!-- Fold corner -->
  <path d="M 397 72 L 419 72 L 419 94 Z"
        fill="rgba(255,111,66,0.15)" stroke="rgba(255,111,66,0.35)" stroke-width="1.5"/>
  <!-- Text lines inside -->
  <rect x="341" y="84"  width="48" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="341" y="93"  width="56" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
  <rect x="341" y="102" width="40" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
  <rect x="341" y="115" width="56" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="341" y="124" width="50" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="341" y="133" width="36" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>

  <!-- "DAILY NEWS" label -->
  <text x="375" y="175"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="800"
        fill="rgba(255,111,66,0.70)"
        text-anchor="middle"
        letter-spacing="3">DAILY NEWS</text>

</svg>
