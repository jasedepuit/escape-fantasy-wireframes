<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 310" width="750" height="310">
  <defs>

    <!-- Background: deep black-burgundy to Giro pink -->
    <linearGradient id="giro-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0E0008"/>
      <stop offset="30%"  stop-color="#380018"/>
      <stop offset="65%"  stop-color="#820038"/>
      <stop offset="100%" stop-color="#C00050"/>
    </linearGradient>

    <!-- Bottom overlay: dark fade for text legibility -->
    <linearGradient id="giro-ovr-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="48%"  stop-color="#000000" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.90"/>
    </linearGradient>

    <!-- Top subtle vignette -->
    <linearGradient id="giro-ovr-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="38%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Left vignette -->
    <linearGradient id="giro-ovr-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- ① Base background -->
  <rect width="750" height="310" fill="url(#giro-bg)"/>

  <!-- ② Atmospheric pink glow (behind mountains) -->
  <ellipse cx="460" cy="72" rx="260" ry="130" fill="#E91E8C" fill-opacity="0.18"/>
  <ellipse cx="460" cy="72" rx="140" ry="72" fill="#F06292" fill-opacity="0.14"/>

  <!-- ③ Far mountain range — dramatic Dolomite profile -->
  <path d="M 0,225 L 58,185 L 110,158 L 164,178 L 220,126 L 276,150 L 320,92 L 372,120 L 426,84 L 482,112 L 536,136 L 590,108 L 646,146 L 704,128 L 750,156 L 750,310 L 0,310 Z"
        fill="rgba(110,0,48,0.52)"/>

  <!-- ④ Near mountain range — foreground ridge -->
  <path d="M 0,282 L 44,252 L 90,234 L 144,256 L 200,210 L 248,230 L 302,184 L 352,206 L 408,170 L 462,194 L 514,212 L 568,190 L 622,224 L 672,214 L 718,242 L 750,256 L 750,310 L 0,310 Z"
        fill="rgba(35,0,16,0.78)"/>

  <!-- ⑤ Subtle highlight on tallest peak -->
  <ellipse cx="426" cy="84" rx="28" ry="14" fill="rgba(255,100,160,0.20)"/>

  <!-- ⑥ Faint speed lines (diagonal texture, top-right) -->
  <line x1="520" y1="0"  x2="750" y2="155" stroke="rgba(255,255,255,0.03)" stroke-width="18"/>
  <line x1="580" y1="0"  x2="750" y2="105" stroke="rgba(255,255,255,0.025)" stroke-width="10"/>
  <line x1="640" y1="0"  x2="750" y2="62"  stroke="rgba(255,255,255,0.02)" stroke-width="6"/>

  <!-- ⑦ Bottom text-area overlay -->
  <rect width="750" height="310" fill="url(#giro-ovr-b)"/>

  <!-- ⑧ Top vignette -->
  <rect width="750" height="310" fill="url(#giro-ovr-t)"/>

  <!-- ⑨ Left vignette (keeps text readable) -->
  <rect width="750" height="310" fill="url(#giro-ovr-l)"/>

  <!-- ⑩ Italian flag strip (vertical bar, left of text) -->
  <rect x="40" y="228" width="4" height="40" rx="2" fill="#009246"/>
  <rect x="45" y="228" width="4" height="40" rx="2" fill="#FFFFFF"/>
  <rect x="50" y="228" width="4" height="40" rx="2" fill="#CE2B37"/>

  <!-- ⑪ Race name -->
  <text x="63" y="258"
        font-family="system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="900" fill="#FFFFFF"
        letter-spacing="-0.5">GIRO D'ITALIA</text>

  <!-- ⑫ Year -->
  <text x="64" y="278"
        font-family="system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="rgba(255,255,255,0.55)"
        letter-spacing="3.5">2026</text>

  <!-- ⑬ Accent dot — Giro pink -->
  <circle cx="710" cy="258" r="5" fill="#E91E8C" fill-opacity="0.7"/>
  <circle cx="724" cy="258" r="3" fill="#E91E8C" fill-opacity="0.4"/>
  <circle cx="734" cy="258" r="2" fill="#E91E8C" fill-opacity="0.25"/>

</svg>
